<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二年级科学探险</title>
    <!-- 引入样式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FFF0F5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .topic-card { transition: all 0.3s ease; }
        .topic-card:hover { transform: scale(1.05); }
        .hidden { display: none; }
    </style>
</head>
<body class="p-6">

    <!-- 顶部标题 -->
    <header class="text-center mb-10">
        <h1 class="text-4xl font-bold text-pink-600 mb-2">🐾 二年级科学探险 🐾</h1>
        <p id="page-subtitle" class="text-pink-400 text-lg">请选择一个科学主题！</p>
    </header>

    <!-- 主目录界面 -->
    <div id="main-menu" class="max-w-4xl mx-auto grid grid-cols-1 sm:grid-cols-2 gap-6">
        
        <!-- 主题1：动物 -->
        <button onclick="showTopic('animals')" class="topic-card bg-orange-100 border-4 border-orange-300 rounded-3xl p-8 flex flex-col items-center shadow-lg">
            <div class="bg-white p-4 rounded-full mb-4 text-4xl">🐾</div>
            <span class="text-2xl font-bold text-gray-700">动物世界</span>
        </button>

        <!-- 主题2：植物 -->
        <button onclick="showTopic('plants')" class="topic-card bg-green-100 border-4 border-green-300 rounded-3xl p-8 flex flex-col items-center shadow-lg">
            <div class="bg-white p-4 rounded-full mb-4 text-4xl">🌿</div>
            <span class="text-2xl font-bold text-gray-700">植物园地</span>
        </button>

        <!-- 主题3：天气 -->
        <button onclick="showTopic('weather')" class="topic-card bg-blue-100 border-4 border-blue-300 rounded-3xl p-8 flex flex-col items-center shadow-lg">
            <div class="bg-white p-4 rounded-full mb-4 text-4xl">☁️</div>
            <span class="text-2xl font-bold text-gray-700">天气观测</span>
        </button>

        <!-- 主题4：光与暗 -->
        <button onclick="showTopic('light')" class="topic-card bg-yellow-100 border-4 border-yellow-300 rounded-3xl p-8 flex flex-col items-center shadow-lg">
            <div class="bg-white p-4 rounded-full mb-4 text-4xl">☀️</div>
            <span class="text-2xl font-bold text-gray-700">光与暗</span>
        </button>

    </div>

    <!-- 子话题界面（默认隐藏） -->
    <div id="sub-menu" class="max-w-4xl mx-auto hidden">
        <button onclick="goBack()" class="mb-6 flex items-center gap-2 text-pink-600 font-bold bg-white/50 px-4 py-2 rounded-full">
            ⬅️ 返回主目录
        </button>
        
        <div id="topic-box" class="p-8 rounded-3xl border-4 bg-white shadow-xl">
            <h2 id="topic-title" class="text-3xl font-bold text-gray-800 mb-8 text-center">主题名字</h2>
            
            <!-- 游戏列表容器 -->
            <div id="game-list" class="grid grid-cols-1 gap-4 mb-8">
                <!-- 游戏链接会通过 JS 动态生成 -->
            </div>

            <!-- 底部大返回按钮 -->
            <button onclick="goBack()" class="w-full bg-gray-100 border-2 border-gray-200 py-4 rounded-2xl flex items-center justify-center gap-3 text-gray-500 font-bold hover:bg-pink-100 hover:text-pink-600 transition-all">
                🏠 选其他主题
            </button>
        </div>
    </div>

    <footer class="text-center mt-12 text-gray-400 italic">让科学变得更有趣！✨</footer>

    <script>
        // --- 在这里管理你的游戏数据 ---
        const gameData = {
            animals: {
                title: "动物世界",
                colorClass: "bg-orange-100",
                borderColor: "border-orange-300",
                games: [
                    { name: "动物的繁殖方式", link: "卵生胎生.html" },
                    { name: "卵生vs胎生", link: "卵生胎生02.html" },
                    { name: "产卵大作战", link: "chanluan.html" },
                    { name: "动物生命周期挑战赛", link: "game_animal.html" },
                    { name: "我和妈妈长得像不像", link: "animal.html" },
                    { name: "大挑战", link: "challenge.html" }
                ]
            },
            plants: {
                title: "植物园地",
                colorClass: "bg-green-100",
                borderColor: "border-green-300",
                games: [
                    { name: "植物的组成部分", link: "parts.html" },
                    { name: "种子发芽", link: "seeds.html" }
                ]
            },
            weather: {
                title: "天气观测",
                colorClass: "bg-blue-100",
                borderColor: "border-blue-300",
                games: [
                    { name: "认识云朵", link: "clouds.html" }
                ]
            },
            light: {
                title: "光与暗",
                colorClass: "bg-yellow-100",
                borderColor: "border-yellow-300",
                games: [
                    { name: "影子的形成", link: "shadows.html" }
                ]
            }
        };

        function showTopic(topicId) {
            const data = gameData[topicId];
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('sub-menu').classList.remove('hidden');
            document.getElementById('page-subtitle').innerText = "正在探索：" + data.title;
            
            document.getElementById('topic-title').innerText = data.title;
            const topicBox = document.getElementById('topic-box');
            topicBox.className = `p-8 rounded-3xl border-4 shadow-xl ${data.colorClass} ${data.borderColor}`;

            const listContainer = document.getElementById('game-list');
            listContainer.innerHTML = ""; // 清空旧列表

            data.games.forEach((game, index) => {
                listContainer.innerHTML += `
                    <a href="${game.link}" class="bg-white p-5 rounded-2xl flex items-center justify-between shadow-md hover:border-pink-300 border-2 border-transparent transition-all">
                        <div class="flex items-center gap-4">
                            <span class="bg-pink-100 text-pink-600 font-bold w-10 h-10 rounded-full flex items-center justify-center">${index + 1}</span>
                            <span class="text-xl font-medium text-gray-700">${game.name}</span>
                        </div>
                        <span class="text-pink-400 font-bold">开始游戏 🎮</span>
                    </a>
                `;
            });
        }

        function goBack() {
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('sub-menu').classList.add('hidden');
            document.getElementById('page-subtitle').innerText = "请选择一个科学主题！";
        }
    </script>
</body>
</html>
