<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产卵大作战</title>
    <!-- 引入字体和Tailwind CSS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #fff7ed;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }
        .cute-font {
            font-family: 'ZCOOL KuaiLe', cursive;
        }
        .animate-pop {
            animation: pop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .timer-bar {
            transition: width 0.1s linear;
        }
        .correct-flash {
            animation: flash-green 0.4s;
        }
        .wrong-flash {
            animation: flash-red 0.4s;
        }
        @keyframes flash-green {
            0%, 100% { background-color: transparent; }
            50% { background-color: rgba(34, 197, 94, 0.2); }
        }
        @keyframes flash-red {
            0%, 100% { background-color: transparent; }
            50% { background-color: rgba(239, 68, 68, 0.2); }
        }
        @media (max-height: 600px) {
            #animal-icon { font-size: 60px; }
            #animal-name { font-size: 32px; }
            .btn-content { font-size: 20px; }
            .btn-emoji { font-size: 30px; }
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- 状态栏 -->
    <div class="bg-white shadow-sm p-4 flex justify-between items-center z-10">
        <div class="flex items-center gap-8">
            <div class="text-center">
                <span class="text-[10px] font-bold text-gray-400 block uppercase tracking-wider">得分</span>
                <span id="score" class="text-4xl font-black text-orange-600">0</span>
            </div>
            <div class="text-center">
                <span class="text-[10px] font-bold text-gray-400 block uppercase tracking-wider">倒计时</span>
                <span id="timer" class="text-4xl font-black text-blue-600">30</span><span class="text-blue-600 font-bold ml-1 text-sm">s</span>
            </div>
        </div>
        <div class="text-right">
            <h1 class="cute-font text-2xl text-orange-500">产卵大作战</h1>
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">30S Challenge</p>
        </div>
    </div>

    <!-- 进度条 -->
    <div class="w-full h-2 bg-gray-200">
        <div id="progress" class="h-full bg-orange-500 timer-bar" style="width: 100%"></div>
    </div>

    <!-- 游戏主体 -->
    <div id="game-body" class="flex-grow flex flex-col items-center justify-center p-4 gap-6">
        
        <!-- 题目卡片 -->
        <div id="question-card" class="bg-white rounded-[30px] shadow-xl p-8 w-full max-w-sm text-center border-b-8 border-orange-200 animate-pop">
            <div id="animal-icon" class="text-8xl leading-none mb-2">🐸</div>
            <h2 id="animal-name" class="cute-font text-5xl mb-2 text-gray-800">青蛙</h2>
            <div class="text-sm text-orange-600 font-bold bg-orange-50 inline-block px-4 py-1 rounded-full uppercase">
                产卵数量是？
            </div>
        </div>

        <!-- 按钮 -->
        <div class="grid grid-cols-2 gap-6 w-full max-w-md">
            <button onclick="checkAnswer('多')" class="bg-emerald-500 hover:bg-emerald-600 text-white rounded-[30px] py-6 shadow-[0_8px_0_#059669] active:shadow-none active:translate-y-1 transition-all">
                <div class="text-4xl mb-1 btn-emoji">🥚🥚🥚</div>
                <div class="text-3xl cute-font btn-content">很多</div>
                <div class="text-xs opacity-80 font-bold tracking-tighter">BANYAK</div>
            </button>
            
            <button onclick="checkAnswer('少')" class="bg-sky-500 hover:bg-sky-600 text-white rounded-[30px] py-6 shadow-[0_8px_0_#0284c7] active:shadow-none active:translate-y-1 transition-all">
                <div class="text-4xl mb-1 btn-emoji">🥚</div>
                <div class="text-3xl cute-font btn-content">较少</div>
                <div class="text-xs opacity-80 font-bold tracking-tighter">SEDIKIT</div>
            </button>
        </div>
    </div>

    <!-- 开始界面 -->
    <div id="overlay" class="fixed inset-0 bg-orange-500 z-50 flex items-center justify-center p-6">
        <div class="bg-white rounded-[40px] p-10 text-center shadow-2xl max-w-xs border-8 border-orange-200">
            <div class="text-8xl mb-6">🥚</div>
            <h2 class="cute-font text-5xl text-orange-600 mb-4">产卵大作战</h2>
            <p class="text-gray-500 mb-8 text-lg font-bold leading-relaxed">
                科学课本P43知识挑战<br>
                <span class="text-blue-500">限时 30 秒！</span>
            </p>
            <button onclick="startGame()" class="w-full bg-orange-500 hover:bg-orange-600 text-white py-5 rounded-3xl text-3xl cute-font shadow-[0_8px_0_#c2410c] active:translate-y-1 active:shadow-none transition-all">
                开始游戏
            </button>
        </div>
    </div>

    <!-- 结果界面 -->
    <div id="result-overlay" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-6">
        <div class="text-center w-full max-w-sm">
            <h2 class="cute-font text-6xl text-orange-400 mb-8">时间到！</h2>
            <div class="bg-white/10 rounded-[35px] p-8 mb-10 border border-white/10 shadow-2xl">
                <p class="text-2xl text-gray-300 mb-2">你的总得分</p>
                <div class="text-8xl font-black text-white" id="final-score">0</div>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-10">
                <div class="bg-emerald-500/20 p-5 rounded-2xl border border-emerald-500/30">
                    <p class="text-emerald-400 font-bold text-xs uppercase tracking-widest mb-1">答对题数</p>
                    <p id="correct-count" class="text-4xl font-black text-white">0</p>
                </div>
                <div class="bg-white/5 p-5 rounded-2xl border border-white/10">
                    <p class="text-gray-400 font-bold text-xs uppercase tracking-widest mb-1">准确率</p>
                    <p id="accuracy" class="text-4xl font-black text-white">0%</p>
                </div>
            </div>

            <button onclick="location.reload()" class="w-full bg-white text-orange-600 py-5 rounded-[20px] text-3xl font-black shadow-[0_8px_0_#cbd5e1] hover:bg-gray-50 transition-all active:scale-95 active:shadow-none">
                再次挑战
            </button>
        </div>
    </div>

    <script>
        const animals = [
            { name: '青蛙', type: '多', icon: '🐸' },
            { name: '鱼', type: '多', icon: '🐟' },
            { name: '蚊子', type: '多', icon: '🦟' },
            { name: '蝴蝶', type: '多', icon: '🦋' },
            { name: '海龟', type: '多', icon: '🐢' },
            { name: '苍蝇', type: '多', icon: '🪰' },
            { name: '蚂蚁', type: '多', icon: '🐜' },
            { name: '小鸟', type: '少', icon: '🐦' },
            { name: '鸵鸟', type: '少', icon: '🦩' }, 
            { name: '企鹅', type: '少', icon: '🐧' },
            { name: '天鹅', type: '少', icon: '🦢' },
            { name: '猫头鹰', type: '少', icon: '🦉' }
        ];

        let score = 0;
        let timeLeft = 30;
        let gameActive = false;
        let currentAnimal = null;
        let timerInterval = null;
        let totalAnswered = 0;
        let correctCount = 0;

        function startGame() {
            document.getElementById('overlay').classList.add('hidden');
            gameActive = true;
            score = 0;
            timeLeft = 30;
            totalAnswered = 0;
            correctCount = 0;
            updateUI();
            nextQuestion();
            startTimer();
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                timeLeft -= 0.1;
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    endGame();
                }
                document.getElementById('timer').innerText = Math.ceil(timeLeft);
                document.getElementById('progress').style.width = (timeLeft / 30 * 100) + '%';
            }, 100);
        }

        function nextQuestion() {
            const card = document.getElementById('question-card');
            card.classList.remove('animate-pop');
            void card.offsetWidth; 
            card.classList.add('animate-pop');

            currentAnimal = animals[Math.floor(Math.random() * animals.length)];
            document.getElementById('animal-icon').innerText = currentAnimal.icon;
            document.getElementById('animal-name').innerText = currentAnimal.name;
        }

        function checkAnswer(choice) {
            if (!gameActive) return;

            totalAnswered++;
            const body = document.getElementById('game-body');
            
            if (choice === currentAnimal.type) {
                score += 10;
                correctCount++;
                body.classList.add('correct-flash');
                setTimeout(() => body.classList.remove('correct-flash'), 400);
            } else {
                score = Math.max(0, score - 5);
                body.classList.add('wrong-flash');
                setTimeout(() => body.classList.remove('wrong-flash'), 400);
            }
            
            updateUI();
            nextQuestion();
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            document.getElementById('final-score').innerText = score;
            document.getElementById('correct-count').innerText = correctCount;
            const acc = totalAnswered > 0 ? Math.round((correctCount / totalAnswered) * 100) : 0;
            document.getElementById('accuracy').innerText = acc + '%';
            document.getElementById('result-overlay').classList.remove('hidden');
        }
    </script>
</body>
</html>
