<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动物生命周期挑战赛</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #f0fdf4;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }
        .cute-font {
            font-family: 'ZCOOL KuaiLe', cursive;
        }
        .stage-btn {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .stage-btn:active {
            transform: scale(0.92);
        }
        .animate-pop {
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .shake {
            animation: shake 0.4s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .correct-item {
            border: 4px solid #22c55e !important;
            background-color: #f0fdf4 !important;
        }
        .wrong-item {
            border: 4px solid #ef4444 !important;
            background-color: #fef2f2 !important;
        }
        /* SVG 图标容器 */
        .icon-container {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-container svg {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- 顶部状态栏 -->
    <div class="bg-white shadow-sm p-3 flex justify-between items-center z-10 shrink-0">
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2">
                <span class="text-gray-400 font-bold text-[10px] uppercase">进度</span>
                <span id="current-round" class="text-2xl font-black text-green-600">1</span>
                <span class="text-gray-300 font-bold">/ 6</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-gray-400 font-bold text-[10px] uppercase">计时</span>
                <span id="timer" class="text-2xl font-black text-blue-600">0.0</span>
                <span class="text-blue-600 font-bold text-[10px]">s</span>
            </div>
        </div>
        <h1 class="cute-font text-xl text-green-600 tracking-wider">生命周期排列挑战</h1>
    </div>

    <!-- 进度条 -->
    <div class="w-full h-1.5 bg-gray-100 shrink-0">
        <div id="progress" class="h-full bg-green-500 transition-all duration-500" style="width: 16.6%"></div>
    </div>

    <!-- 主游戏区域 -->
    <div class="flex-grow flex flex-row overflow-hidden">
        
        <!-- 左侧：动物大图区 -->
        <div class="w-[35%] bg-white/50 border-r-2 border-green-100 flex flex-col items-center justify-center p-4 shrink-0">
            <div id="animal-icon" class="text-8xl md:text-9xl mb-4 animate-pop drop-shadow-lg flex items-center justify-center min-h-[160px]">🐸</div>
            <h2 id="animal-name" class="cute-font text-4xl md:text-5xl text-gray-800 mb-1">青蛙</h2>
            <div class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-[10px] font-bold">观察它的成长过程</div>
        </div>

        <!-- 右侧：操作区 -->
        <div class="w-[65%] flex flex-col p-4 md:p-6 overflow-hidden bg-white/30">
            
            <!-- 上部：排列区 -->
            <div class="mb-4 shrink-0">
                <h3 class="text-gray-400 font-bold mb-2 uppercase tracking-widest text-[10px] flex items-center gap-2">
                    <span class="w-4 h-px bg-gray-300"></span> 你的排列顺序 <span class="w-4 h-px bg-gray-300"></span>
                </h3>
                <div id="sequence-display" class="flex flex-wrap items-center justify-start gap-2 min-h-[110px] p-3 bg-white/80 rounded-[20px] border-4 border-dashed border-green-200 shadow-inner">
                </div>
            </div>

            <!-- 下部：选择按钮区 -->
            <div class="flex-grow flex flex-col">
                <h3 class="text-gray-400 font-bold mb-2 uppercase tracking-widest text-[10px] flex items-center gap-2">
                    <span class="w-4 h-px bg-gray-300"></span> 点击选择阶段 <span class="w-4 h-px bg-gray-300"></span>
                </h3>
                <div id="options-container" class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                </div>
            </div>

            <!-- 底部：提交与反馈 -->
            <div class="mt-4 flex justify-between items-center h-16 shrink-0">
                <p id="feedback-text" class="hidden flex-grow mr-4 bg-red-100 text-red-600 px-4 py-2 rounded-xl font-bold border border-red-200 animate-pop text-xs text-center"></p>
                <button id="submit-btn" onclick="checkAllStages()" class="hidden ml-auto bg-orange-500 hover:bg-orange-600 text-white text-lg px-8 py-3 rounded-2xl font-bold shadow-[0_4px_0_#c2410c] active:translate-y-1 active:shadow-none transition-all cute-font animate-pop whitespace-nowrap">
                    确认提交 🚀
                </button>
            </div>
        </div>
    </div>

    <!-- 覆盖层：开始 -->
    <div id="overlay" class="fixed inset-0 bg-green-600 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[40px] p-8 text-center shadow-2xl max-w-sm border-[10px] border-green-200">
            <div class="text-7xl mb-4">🌱</div>
            <h2 class="cute-font text-4xl text-green-700 mb-2">成长挑战</h2>
            <p class="text-gray-500 mb-8 text-sm font-bold leading-relaxed">
                把生长阶段按顺序排好，<br>帮助这些动物长大吧！
            </p>
            <button onclick="startGame()" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl text-2xl cute-font shadow-[0_6px_0_#15803d] active:translate-y-1 active:shadow-none transition-all">
                开始挑战
            </button>
        </div>
    </div>

    <!-- 结果显示 -->
    <div id="result-overlay" class="hidden fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-6 text-white text-center">
        <div class="w-full max-w-md">
            <div class="text-7xl mb-6">🏆</div>
            <h2 class="cute-font text-5xl text-yellow-400 mb-6">挑战成功！</h2>
            <div class="bg-white/10 backdrop-blur-md rounded-[30px] p-6 mb-8 border border-white/20">
                <p class="text-xl opacity-70 mb-1">总计用时</p>
                <div class="text-6xl font-black text-white mb-2"><span id="final-time">0.0</span>s</div>
                <div id="total-errors" class="inline-block bg-red-500/20 text-red-300 px-4 py-1 rounded-full text-xs font-bold"></div>
            </div>
            <button onclick="location.reload()" class="w-full bg-white text-slate-900 py-4 rounded-2xl text-2xl font-black shadow-xl hover:bg-gray-100 transition-colors">
                再玩一次
            </button>
        </div>
    </div>

    <script>
        // SVG 图标定义
        const ICONS = {
            frog_eggs: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="rgba(200,255,200,0.5)" stroke="#66bb6a" stroke-width="2"/><circle cx="40" cy="40" r="6" fill="#111"/><circle cx="60" cy="45" r="6" fill="#111"/><circle cx="45" cy="65" r="6" fill="#111"/><circle cx="30" cy="50" r="6" fill="#111"/><circle cx="70" cy="60" r="6" fill="#111"/></svg>`,
            tadpole: `<svg viewBox="0 0 100 100"><path d="M70,50 C70,70 50,80 30,50 C50,20 70,30 70,50" fill="#333"/><path d="M30,50 Q10,50 5,60 Q10,70 30,50" fill="#444" stroke="#222" stroke-width="2"/><circle cx="55" cy="42" r="3" fill="white"/></svg>`,
            froglet: `<svg viewBox="0 0 100 100"><path d="M40,30 Q50,20 60,30 Q80,40 60,70 Q50,85 40,70 Q20,40 40,30" fill="#4caf50"/><path d="M60,70 L85,80" stroke="#2e7d32" stroke-width="4" stroke-linecap="round"/><path d="M35,60 L20,70" stroke="#2e7d32" stroke-width="4" stroke-linecap="round"/><path d="M40,70 Q30,90 10,95" fill="none" stroke="#2e7d32" stroke-width="2" stroke-linecap="round"/><circle cx="45" cy="35" r="3" fill="black"/><circle cx="55" cy="35" r="3" fill="black"/></svg>`,
            pupa_butterfly: `<svg viewBox="0 0 100 100"><path d="M50,10 L50,25" stroke="#795548" stroke-width="4"/><path d="M35,25 Q50,15 65,25 Q75,50 50,90 Q25,50 35,25" fill="#8bc34a" stroke="#558b2f" stroke-width="2"/><path d="M40,40 L60,40 M40,55 L60,55 M45,70 L55,70" stroke="rgba(0,0,0,0.1)" stroke-width="2"/></svg>`,
            pupa_mosquito: `<svg viewBox="0 0 100 100"><circle cx="50" cy="40" r="25" fill="#555"/><path d="M75,40 Q80,80 50,90" fill="none" stroke="#555" stroke-width="8" stroke-linecap="round"/><circle cx="60" cy="35" r="4" fill="#999"/></svg>`,
            wiggly: `<svg viewBox="0 0 100 100"><path d="M50,10 Q60,30 40,50 Q60,70 50,90" fill="none" stroke="#444" stroke-width="6" stroke-linecap="round"/><path d="M50,10 L40,5 L60,5" fill="none" stroke="#222" stroke-width="2"/></svg>`,
            grasshopper_eggs: `<svg viewBox="0 0 100 100"><rect x="30" y="40" width="10" height="30" rx="5" fill="#d7ccc8" transform="rotate(-10 35 55)"/><rect x="45" y="45" width="10" height="30" rx="5" fill="#d7ccc8" transform="rotate(5 50 60)"/><rect x="60" y="40" width="10" height="30" rx="5" fill="#d7ccc8" transform="rotate(15 65 55)"/><path d="M20,80 Q50,70 80,80" fill="none" stroke="#a1887f" stroke-width="4"/></svg>`
        };

        const lifecycleData = [
            { 
                name: '青蛙', 
                icon: '🐸', 
                stages: [
                    {id:1,l:'卵团',e:ICONS.frog_eggs, isSvg:true},
                    {id:2,l:'蝌蚪',e:ICONS.tadpole, isSvg:true},
                    {id:3,l:'幼蛙',e:ICONS.froglet, isSvg:true},
                    {id:4,l:'成蛙',e:'🐸', isSvg:false}
                ] 
            },
            { 
                name: '蝴蝶', 
                icon: '🦋', 
                stages: [
                    {id:1,l:'卵',e:'⚪', isSvg:false},
                    {id:2,l:'毛虫',e:'🐛', isSvg:false},
                    {id:3,l:'蛹',e:ICONS.pupa_butterfly, isSvg:true},
                    {id:4,l:'蝴蝶',e:'🦋', isSvg:false}
                ] 
            },
            { 
                name: '蚊子', 
                icon: '🦟', 
                stages: [
                    {id:1,l:'卵筏',e:'🔘', isSvg:false},
                    {id:2,l:'孑孓',e:ICONS.wiggly, isSvg:true},
                    {id:3,l:'蛹',e:ICONS.pupa_mosquito, isSvg:true},
                    {id:4,l:'蚊子',e:'🦟', isSvg:false}
                ] 
            },
            { 
                name: '小鸡', 
                icon: '🐥', 
                stages: [
                    {id:1,l:'鸡蛋',e:'🥚', isSvg:false},
                    {id:2,l:'小鸡',e:'🐥', isSvg:false},
                    {id:3,l:'公鸡',e:'🐔', isSvg:false}
                ] 
            },
            { 
                name: '蚱蜢', 
                icon: '🦗', 
                stages: [
                    {id:1,l:'卵块',e:ICONS.grasshopper_eggs, isSvg:true},
                    {id:2,l:'若虫',e:'🦟', isSvg:false},
                    {id:3,l:'成虫',e:'🦗', isSvg:false}
                ] 
            },
            { 
                name: '小鸟', 
                icon: '🐦', 
                stages: [
                    {id:1,l:'鸟蛋',e:'🥚', isSvg:false},
                    {id:2,l:'雏鸟',e:'🐣', isSvg:false},
                    {id:3,l:'成鸟',e:'🐦', isSvg:false}
                ] 
            }
        ];

        let timeElapsed = 0;
        let gameActive = false;
        let timerInterval = null;
        let currentRoundIndex = 0;
        let gamePool = [];
        let userSelection = [];
        let totalErrorCount = 0;
        let currentAnimal = null;

        function getStageIconHtml(stage, sizeClass = "text-4xl") {
            if (stage.isSvg) {
                return `<div class="icon-container">${stage.e}</div>`;
            }
            return `<span class="${sizeClass}">${stage.e}</span>`;
        }

        function startGame() {
            document.getElementById('overlay').classList.add('hidden');
            gameActive = true;
            timeElapsed = 0;
            currentRoundIndex = 0;
            totalErrorCount = 0;
            gamePool = [...lifecycleData].sort(() => Math.random() - 0.5);
            nextRound();
            startTimer();
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                timeElapsed += 0.1;
                document.getElementById('timer').innerText = timeElapsed.toFixed(1);
            }, 100);
        }

        function nextRound() {
            if (currentRoundIndex >= 6) {
                endGame();
                return;
            }

            userSelection = [];
            currentAnimal = gamePool[currentRoundIndex];
            
            document.getElementById('current-round').innerText = currentRoundIndex + 1;
            document.getElementById('progress').style.width = ((currentRoundIndex + 1) / 6 * 100) + '%';
            
            // 处理左侧大图标（有些是SVG，有些是Emoji）
            const iconBox = document.getElementById('animal-icon');
            iconBox.innerHTML = currentAnimal.icon;

            document.getElementById('animal-name').innerText = currentAnimal.name;
            document.getElementById('submit-btn').classList.add('hidden');
            document.getElementById('feedback-text').classList.add('hidden');
            
            renderDisplay();
            renderOptions();
        }

        function renderOptions() {
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            const remaining = currentAnimal.stages.filter(s => !userSelection.find(u => u.l === s.l));
            const shuffled = [...remaining].sort(() => Math.random() - 0.5);

            shuffled.forEach(stage => {
                const btn = document.createElement('button');
                btn.className = "stage-btn bg-white border-2 border-gray-100 rounded-[20px] p-3 flex flex-col items-center justify-center shadow-sm hover:border-green-300 transition-all active:bg-green-50";
                btn.innerHTML = `${getStageIconHtml(stage, "text-3xl sm:text-4xl")}<span class="text-[10px] font-bold text-gray-600 mt-1">${stage.l}</span>`;
                btn.onclick = () => selectStage(stage);
                container.appendChild(btn);
            });
        }

        function renderDisplay() {
            const display = document.getElementById('sequence-display');
            display.innerHTML = '';
            userSelection.forEach((stage, index) => {
                const item = document.createElement('div');
                item.className = "relative bg-white border-2 border-green-50 p-2 rounded-xl flex flex-col items-center min-w-[76px] cursor-pointer animate-pop hover:bg-red-50 group transition-colors shadow-sm";
                item.innerHTML = `
                    ${getStageIconHtml(stage, "text-2xl")}
                    <span class="text-[9px] font-bold text-gray-400 mt-1">${stage.l}</span>
                    <div class="absolute -top-1.5 -right-1.5 bg-red-500 text-white rounded-full w-5 h-5 text-[8px] flex items-center justify-center opacity-0 group-hover:opacity-100 shadow-md transition-opacity font-bold">✕</div>
                `;
                item.onclick = () => deselectStage(index);
                display.appendChild(item);
            });

            if (userSelection.length === currentAnimal.stages.length) {
                document.getElementById('submit-btn').classList.remove('hidden');
            } else {
                document.getElementById('submit-btn').classList.add('hidden');
            }
        }

        function selectStage(stage) {
            if (userSelection.length < currentAnimal.stages.length) {
                userSelection.push(stage);
                renderDisplay();
                renderOptions();
                document.getElementById('feedback-text').classList.add('hidden');
            }
        }

        function deselectStage(index) {
            userSelection.splice(index, 1);
            renderDisplay();
            renderOptions();
            document.getElementById('feedback-text').classList.add('hidden');
        }

        function checkAllStages() {
            const displayItems = document.getElementById('sequence-display').children;
            let roundErrors = 0;

            userSelection.forEach((stage, index) => {
                const correctStage = currentAnimal.stages[index];
                if (stage.l === correctStage.l) {
                    displayItems[index].classList.add('correct-item');
                } else {
                    displayItems[index].classList.add('wrong-item', 'shake');
                    roundErrors++;
                }
            });

            if (roundErrors === 0) {
                document.getElementById('submit-btn').classList.add('hidden');
                document.getElementById('feedback-text').innerHTML = "🌟 太棒了，全部正确！";
                document.getElementById('feedback-text').className = "flex-grow mr-4 bg-green-100 text-green-600 px-4 py-2 rounded-xl font-bold border border-green-200 animate-pop text-xs text-center block";
                
                setTimeout(() => {
                    currentRoundIndex++;
                    nextRound();
                }, 1200);
            } else {
                totalErrorCount += roundErrors;
                timeElapsed += (roundErrors * 2); 
                const fb = document.getElementById('feedback-text');
                fb.className = "flex-grow mr-4 bg-red-100 text-red-600 px-4 py-2 rounded-xl font-bold border border-red-200 animate-pop text-xs text-center block";
                fb.innerHTML = `❌ 顺序有误 (计时惩罚 +${roundErrors*2}s)`;
            }
        }

        function endGame() {
            gameActive = false;
            clearInterval(timerInterval);
            document.getElementById('final-time').innerText = timeElapsed.toFixed(1);
            document.getElementById('total-errors').innerText = `发现错误: ${totalErrorCount} 次`;
            document.getElementById('result-overlay').classList.remove('hidden');
        }
    </script>
</body>
</html>
