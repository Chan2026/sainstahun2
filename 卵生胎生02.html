<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动物繁殖大冒险</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #ecfdf5;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }
        .cute-font {
            font-family: 'ZCOOL KuaiLe', cursive;
        }
        #game-canvas {
            background: linear-gradient(to bottom, #bae6fd, #f0f9ff);
            display: block;
            margin: 0 auto;
            border-bottom: 8px solid #4ade80;
        }
        .btn-active {
            transform: scale(0.95);
            filter: brightness(0.9);
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .floating {
            animation: float 2s ease-in-out infinite;
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- UI Overlay: Header -->
    <div class="p-4 bg-white shadow-md z-10 flex justify-between items-center">
        <div>
            <h1 class="cute-font text-2xl md:text-3xl text-emerald-600">🐾 卵生胎生大冒险</h1>
        </div>
        <div class="flex gap-4 items-center">
            <div class="text-xl font-bold text-orange-500">分数: <span id="score-val">0</span></div>
            <div class="text-xl font-bold text-red-500">生命: <span id="life-val">❤️❤️❤️</span></div>
        </div>
    </div>

    <!-- Game Area -->
    <div class="relative flex-grow overflow-hidden bg-sky-100" id="game-container">
        <canvas id="game-canvas"></canvas>

        <!-- Start Overlay -->
        <div id="start-screen" class="absolute inset-0 bg-black/40 flex items-center justify-center z-20">
            <div class="bg-white p-8 rounded-3xl text-center shadow-2xl max-w-sm floating">
                <div class="text-6xl mb-4">🥚 🐶</div>
                <h2 class="cute-font text-4xl text-emerald-600 mb-2">准备好了吗？</h2>
                <p class="text-gray-600 mb-6">点击正确的按钮接住掉落的动物！</p>
                <button onclick="startGame()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-10 py-4 rounded-full text-2xl font-bold shadow-lg transition-transform active:scale-95">
                    开始游戏
                </button>
            </div>
        </div>

        <!-- GameOver Overlay -->
        <div id="game-over-screen" class="hidden absolute inset-0 bg-black/60 flex items-center justify-center z-20">
            <div class="bg-white p-8 rounded-3xl text-center shadow-2xl">
                <h2 class="cute-font text-5xl text-red-500 mb-2">游戏结束!</h2>
                <p class="text-2xl mb-6">最终得分: <span id="final-score">0</span></p>
                <button onclick="startGame()" class="bg-blue-500 hover:bg-blue-600 text-white px-8 py-3 rounded-full text-xl font-bold transition">
                    重新挑战
                </button>
            </div>
        </div>
    </div>

    <!-- Control Buttons -->
    <div class="p-6 bg-white grid grid-cols-2 gap-4 h-32 md:h-40">
        <button onmousedown="checkAnswer('卵生')" ontouchstart="checkAnswer('卵生')" 
                class="bg-emerald-500 hover:bg-emerald-600 text-white rounded-2xl text-2xl md:text-4xl cute-font shadow-inner active:btn-active">
            🥚 卵生
        </button>
        <button onmousedown="checkAnswer('胎生')" ontouchstart="checkAnswer('胎生')" 
                class="bg-blue-500 hover:bg-blue-600 text-white rounded-2xl text-2xl md:text-4xl cute-font shadow-inner active:btn-active">
            🍼 胎生
        </button>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-container');
        
        let score = 0;
        let lives = 3;
        let gameActive = false;
        let fallingAnimals = [];
        let spawnTimer = 0;
        let gameSpeed = 2;

        const animalData = [
            { name: '鸡', type: '卵生', icon: '🐔' },
            { name: '猫', type: '胎生', icon: '🐱' },
            { name: '乌龟', type: '卵生', icon: '🐢' },
            { name: '大象', type: '胎生', icon: '🐘' },
            { name: '青蛙', type: '卵生', icon: '🐸' },
            { name: '狗', type: '胎生', icon: '🐶' },
            { name: '鳄鱼', type: '卵生', icon: '🐊' },
            { name: '牛', type: '胎生', icon: '🐄' },
            { name: '蛇', type: '卵生', icon: '🐍' },
            { name: '海豚', type: '胎生', icon: '🐬' },
            { name: '企鹅', type: '卵生', icon: '🐧' },
            { name: '猴子', type: '胎生', icon: '🐒' },
            { name: '蝴蝶', type: '卵生', icon: '🦋' },
            { name: '狮子', type: '胎生', icon: '🦁' }
        ];

        function resize() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class FallingAnimal {
            constructor() {
                const data = animalData[Math.floor(Math.random() * animalData.length)];
                this.name = data.name;
                this.type = data.type;
                this.icon = data.icon;
                this.x = Math.random() * (canvas.width - 100) + 50;
                this.y = -50;
                this.speed = gameSpeed + Math.random();
                this.size = 60;
                this.rotation = 0;
            }

            update() {
                this.y += this.speed;
                this.rotation += 0.02;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.icon, 0, 0);
                
                // Draw name tag
                ctx.rotate(-this.rotation);
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.font = 'bold 18px Arial';
                ctx.fillText(this.name, 0, 45);
                ctx.restore();
            }
        }

        function startGame() {
            score = 0;
            lives = 3;
            gameSpeed = 2;
            fallingAnimals = [];
            gameActive = true;
            document.getElementById('score-val').innerText = score;
            updateLivesDisplay();
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
            gameLoop();
        }

        function updateLivesDisplay() {
            document.getElementById('life-val').innerText = '❤️'.repeat(lives);
        }

        function checkAnswer(chosenType) {
            if (!gameActive || fallingAnimals.length === 0) return;

            // Target the animal lowest on the screen
            let targetIndex = 0;
            let maxY = -100;
            fallingAnimals.forEach((anim, index) => {
                if (anim.y > maxY) {
                    maxY = anim.y;
                    targetIndex = index;
                }
            });

            const target = fallingAnimals[targetIndex];
            
            if (target.type === chosenType) {
                score += 10;
                document.getElementById('score-val').innerText = score;
                createParticle(target.x, target.y, '#10b981');
                fallingAnimals.splice(targetIndex, 1);
                
                // Speed up slightly
                gameSpeed += 0.05;
            } else {
                handleMistake(target.x, target.y);
                fallingAnimals.splice(targetIndex, 1);
            }
        }

        function handleMistake(x, y) {
            lives--;
            updateLivesDisplay();
            createParticle(x, y, '#ef4444');
            if (lives <= 0) {
                gameOver();
            }
        }

        function createParticle(x, y, color) {
            // Visual feedback - simple Flash on canvas
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, 80, 0, Math.PI * 2);
            ctx.fill();
        }

        function gameOver() {
            gameActive = false;
            document.getElementById('final-score').innerText = score;
            document.getElementById('game-over-screen').classList.remove('hidden');
        }

        function gameLoop() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Spawn
            spawnTimer++;
            if (spawnTimer > 100 - (gameSpeed * 5)) {
                fallingAnimals.push(new FallingAnimal());
                spawnTimer = 0;
            }

            // Update & Draw
            for (let i = fallingAnimals.length - 1; i >= 0; i--) {
                const anim = fallingAnimals[i];
                anim.update();
                anim.draw();

                // If hit the bottom
                if (anim.y > canvas.height + 50) {
                    handleMistake(anim.x, canvas.height - 20);
                    fallingAnimals.splice(i, 1);
                }
            }

            requestAnimationFrame(gameLoop);
        }

    </script>
</body>
</html>
