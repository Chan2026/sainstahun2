<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小小光影魔术师 - 互动实验室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #1a202c;
            color: white;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            touch-action: manipulation;
        }
        .game-canvas {
            background: linear-gradient(to bottom, #2d3748, #1a202c);
            border: 4px solid #4a5568;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            height: 450px;
        }
        .source-item {
            cursor: pointer;
            transition: transform 0.2s;
        }
        .source-item:hover {
            transform: scale(1.1);
        }
        .light-beam {
            position: absolute;
            left: 50px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 120px;
            background: rgba(255, 255, 150, 0.4);
            box-shadow: 0 0 40px rgba(255, 255, 100, 0.3);
            z-index: 1;
            clip-path: polygon(0 45%, 100% 0, 100% 100%, 0 55%);
            transition: width 0.5s;
        }
        #shadow-cast {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            filter: blur(2px);
            transition: all 0.1s;
            pointer-events: none;
        }
        .draggable {
            cursor: grab;
            user-select: none;
            z-index: 10;
        }
        .draggable:active {
            cursor: grabbing;
        }
        .nav-btn {
            @apply px-4 py-2 rounded-full font-bold transition duration-300;
        }
        .active-nav {
            @apply bg-yellow-500 text-black;
        }
        .inactive-nav {
            @apply bg-gray-700 text-white hover:bg-gray-600;
        }
        /* 亮背景样式 */
        .bright-bg {
            background-color: #f7fafc !important;
            background-image: radial-gradient(#cbd5e0 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-extrabold text-yellow-400 mb-2">🔦 小小光影魔术师</h1>
            <p class="text-gray-400">让我们通过实验，揭开影子的秘密吧！</p>
        </header>

        <!-- 导航 -->
        <nav class="flex justify-center space-x-2 mb-6">
            <button onclick="switchTab('tab1')" id="btn-tab1" class="nav-btn active-nav">1. 谁是光源？</button>
            <button onclick="switchTab('tab2')" id="btn-tab2" class="nav-btn inactive-nav">2. 影子实验室</button>
            <button onclick="switchTab('tab3')" id="btn-tab3" class="nav-btn inactive-nav">3. 穿透力挑战</button>
        </nav>

        <!-- 游戏区域 -->
        <div id="game-container" class="game-canvas shadow-2xl relative">
            
            <!-- 场景1：辨别光源 -->
            <div id="tab1" class="p-8 h-full flex flex-col items-center">
                <h2 class="text-xl mb-6 text-yellow-200">点击能【自己发光】的物体：</h2>
                <div class="grid grid-cols-3 gap-8 md:gap-16">
                    <div onclick="checkSource(true, '太阳是巨大的天然光源！')" class="source-item text-6xl text-center">☀️<p class="text-sm mt-2 text-white">太阳</p></div>
                    <div onclick="checkSource(false, '月亮只是反射太阳光，它不是光源。')" class="source-item text-6xl text-center">🌙<p class="text-sm mt-2 text-white">月亮</p></div>
                    <div onclick="checkSource(true, '打开的手电筒是光源。')" class="source-item text-6xl text-center">🔦<p class="text-sm mt-2 text-white">手电筒</p></div>
                    <div onclick="checkSource(false, '镜子很亮，但它是反射别人的光。')" class="source-item text-6xl text-center">🪞<p class="text-sm mt-2 text-white">镜子</p></div>
                    <div onclick="checkSource(true, '小萤火虫也会自己发光哦！')" class="source-item text-6xl text-center">🐝<p class="text-sm mt-2 text-white">萤火虫</p></div>
                    <div onclick="checkSource(false, '书本需要光才能看见，它不发光。')" class="source-item text-6xl text-center">📖<p class="text-sm mt-2 text-white">书本</p></div>
                </div>
                <div id="feedback1" class="mt-8 text-lg font-bold text-center h-8"></div>
            </div>

            <!-- 场景2：影子实验室 -->
            <div id="tab2" class="hidden h-full relative bg-gray-100">
                <div class="absolute top-4 left-4 text-gray-800 z-20">
                    <p class="font-bold">⬅️ 左右拖动红色物体</p>
                    <div class="flex space-x-2 mt-2">
                        <button onclick="changeShape('square')" class="bg-blue-600 text-white px-3 py-1 rounded text-sm">方块</button>
                        <button onclick="changeShape('circle')" class="bg-green-600 text-white px-3 py-1 rounded text-sm">球体</button>
                    </div>
                </div>
                
                <!-- 手电筒 -->
                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-5xl z-20">🔦</div>
                <div class="light-beam" id="beam2" style="width: 800px; opacity: 0.5;"></div>
                
                <!-- 拖动物体 -->
                <div id="block" class="draggable absolute w-16 h-16 bg-red-600 rounded shadow-lg" style="left: 200px; top: 192px;"></div>
                
                <!-- 墙壁背景 -->
                <div class="absolute right-0 top-0 w-32 h-full bg-gray-300 border-l-4 border-gray-400"></div>
                
                <!-- 影子 -->
                <div id="shadow-cast"></div>
                
                <div class="absolute bottom-4 w-full text-center text-gray-700 font-bold">
                    当物体【遮挡】光线时，影子就形成了！
                </div>
            </div>

            <!-- 场景3：穿透力挑战 (已改为亮色背景) -->
            <div id="tab3" class="hidden h-full relative bright-bg">
                <div class="absolute top-4 left-4 text-gray-800 z-20">
                    <p class="font-bold">选择挡在光面前的材料：</p>
                    <div class="flex space-x-2 mt-2">
                        <button onclick="setMaterial('clear')" class="bg-blue-400 text-white px-3 py-1 rounded-md font-bold shadow-sm">1. 透明玻璃</button>
                        <button onclick="setMaterial('frosted')" class="bg-gray-500 text-white px-3 py-1 rounded-md font-bold shadow-sm">2. 磨砂纸</button>
                        <button onclick="setMaterial('solid')" class="bg-yellow-800 text-white px-3 py-1 rounded-md font-bold shadow-sm">3. 厚木板</button>
                    </div>
                </div>

                <!-- 手电筒 -->
                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-5xl z-20">🔦</div>
                <div id="beam3" class="light-beam" style="width: 800px; opacity: 0.6; background: rgba(255, 255, 100, 0.4);"></div>
                
                <!-- 材料显示 -->
                <div id="material-box" class="absolute w-10 h-40 left-1/2 -translate-x-1/2 top-1/2 -translate-y-1/2 border-4 border-gray-400 transition-all duration-500 z-10" style="background: rgba(255,255,255,0.3);"></div>
                
                <!-- 墙上的影子结果 -->
                <div class="absolute right-0 top-0 w-32 h-full bg-gray-200 border-l-4 border-gray-300"></div>
                <div id="wall-result" class="absolute right-4 top-1/2 -translate-y-1/2 w-24 h-48 bg-black opacity-0 transition-all duration-500 rounded-sm flex items-center justify-center text-center p-2">
                    <span id="material-text" class="text-white font-bold text-sm"></span>
                </div>

                <div class="absolute bottom-4 w-full text-center text-gray-700 px-4 font-bold">
                    <span id="material-desc">光能穿过这些材料吗？点击上方按钮试一试！</span>
                </div>
            </div>

        </div>

        <footer class="mt-6 text-center text-sm text-gray-500">
            二年级科学课：光与影子实验互动课件
        </footer>
    </div>

    <script>
        // 切换标签页
        function switchTab(tabId) {
            ['tab1', 'tab2', 'tab3'].forEach(t => {
                document.getElementById(t).classList.add('hidden');
                document.getElementById('btn-' + t).classList.replace('active-nav', 'inactive-nav');
            });
            document.getElementById(tabId).classList.remove('hidden');
            document.getElementById('btn-' + tabId).classList.replace('inactive-nav', 'active-nav');
            
            if(tabId === 'tab2') initShadowLab();
        }

        // 场景1逻辑
        function checkSource(isCorrect, msg) {
            const fb = document.getElementById('feedback1');
            fb.innerText = msg;
            fb.className = "mt-8 text-lg font-bold text-center h-8 " + (isCorrect ? "text-green-400" : "text-red-400");
        }

        // 场景2逻辑：影子实验室
        function initShadowLab() {
            const block = document.getElementById('block');
            const shadow = document.getElementById('shadow-cast');
            const container = document.getElementById('tab2');
            let isDragging = false;

            const updateShadow = () => {
                const rect = block.getBoundingClientRect();
                const contRect = container.getBoundingClientRect();
                const relativeLeft = rect.left - contRect.left;
                
                const distFromLight = relativeLeft - 50;
                const scale = 1 + (150 / Math.max(distFromLight, 10));
                
                const shadowSize = 64 * scale;
                shadow.style.width = shadowSize + 'px';
                shadow.style.height = shadowSize + 'px';
                shadow.style.right = '32px';
                shadow.style.top = (225 - shadowSize/2) + 'px';
                shadow.style.filter = `blur(${scale * 0.5}px)`;
            };

            block.onmousedown = (e) => { isDragging = true; };
            window.onmousemove = (e) => {
                if (!isDragging) return;
                const contRect = container.getBoundingClientRect();
                let x = e.clientX - contRect.left - 32;
                if (x > 100 && x < 450) {
                    block.style.left = x + 'px';
                    updateShadow();
                }
            };
            window.onmouseup = () => { isDragging = false; };
            
            block.ontouchmove = (e) => {
                const contRect = container.getBoundingClientRect();
                let x = e.touches[0].clientX - contRect.left - 32;
                if (x > 100 && x < 450) {
                    block.style.left = x + 'px';
                    updateShadow();
                }
            };

            updateShadow();
        }

        function changeShape(type) {
            const block = document.getElementById('block');
            const shadow = document.getElementById('shadow-cast');
            if(type === 'circle') {
                block.style.borderRadius = '50%';
                shadow.style.borderRadius = '50%';
            } else {
                block.style.borderRadius = '4px';
                shadow.style.borderRadius = '4px';
            }
        }

        // 场景3逻辑：穿透力 (更新为亮背景下的逻辑)
        function setMaterial(type) {
            const box = document.getElementById('material-box');
            const wall = document.getElementById('wall-result');
            const text = document.getElementById('material-text');
            const desc = document.getElementById('material-desc');
            const beam = document.getElementById('beam3');
            
            wall.style.opacity = "1";

            if(type === 'clear') {
                box.style.background = "rgba(200, 240, 255, 0.3)";
                box.style.border = "4px solid #add8e6";
                wall.style.background = "rgba(0,0,0,0.05)";
                wall.style.filter = "blur(10px)";
                text.innerText = "";
                desc.innerText = "【透明物体】让光全部穿过，几乎没有影子！";
                beam.style.width = "800px";
            } else if(type === 'frosted') {
                box.style.background = "rgba(255, 255, 255, 0.8)";
                box.style.border = "4px solid #cbd5e0";
                wall.style.background = "rgba(0,0,0,0.3)";
                wall.style.filter = "blur(5px)";
                text.innerText = "模糊影子";
                desc.innerText = "【半透明物体】只让一部分光穿过，影子很模糊。";
                beam.style.width = "400px";
            } else if(type === 'solid') {
                box.style.background = "#5d4037";
                box.style.border = "4px solid #3e2723";
                wall.style.background = "rgba(0,0,0,0.9)";
                wall.style.filter = "blur(1px)";
                text.innerText = "清晰影子";
                desc.innerText = "【不透明物体】挡住了所有的光，影子很黑很清楚！";
                beam.style.width = "370px";
            }
        }
    </script>
</body>
</html>
